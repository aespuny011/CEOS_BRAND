<section class="auth-page">
  <div class="auth-card">
    <p class="eyebrow">Acceso privado</p>
    <h1>Inicia sesion</h1>
    <p class="intro">Entra para ver el catalogo completo, guardar productos en tu carrito y comprar.</p>

    <form [formGroup]="formulario" (ngSubmit)="enviar()">
      <label>
        <span>Email</span>
        <input type="email" formControlName="email" placeholder="tu@email.com" />
        <small class="field-error" *ngIf="getFieldError('email')">{{ getFieldError('email') }}</small>
      </label>

      <label>
        <span>Contrasena</span>
        <input type="password" formControlName="password" placeholder="Minimo 6 caracteres" />
        <small class="field-error" *ngIf="getFieldError('password')">{{ getFieldError('password') }}</small>
      </label>

      <p class="error" *ngIf="errorMsg">{{ errorMsg }}</p>

      <button type="submit" [disabled]="loading">
        {{ loading ? 'Entrando...' : 'Iniciar sesion' }}
      </button>
    </form>

    <p class="switch">
      ¿No tienes cuenta?
      <a routerLink="/register">Registrate</a>
    </p>
  </div>
</section>
