spring.application.name=ceos-brand-auth
server.port=8080

spring.datasource.url=${CEOS_DB_URL:jdbc:mysql://127.0.0.1:3306/ceos_brand?useSSL=false&serverTimezone=UTC}
spring.datasource.username=${CEOS_DB_USERNAME:root}
spring.datasource.password=${CEOS_DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.sql.init.mode=always
spring.sql.init.encoding=UTF-8

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.same-site=lax
