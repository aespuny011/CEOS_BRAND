<section class="home">
  <div class="videos-wrapper">
    <!-- Video izquierdo -->
    <video
      #videoIzquierdo
      class="video video-izquierdo"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      disableRemotePlayback
      (error)="onVideoError($event, 'izquierdo')"
      (loadeddata)="onVideoLoaded('izquierdo')">
      <source src="assets/videos/video-izquierdo.mp4" type="video/mp4" />
      <source src="assets/videos/video-izquierdo.webm" type="video/webm" />
      Tu navegador no soporta videos.
    </video>

    <!-- Video derecho -->
    <video
      #videoDerecho
      class="video video-derecho"
      autoplay
      muted
      loop
      playsinline
      preload="auto"
      disableRemotePlayback
      (error)="onVideoError($event, 'derecho')"
      (loadeddata)="onVideoLoaded('derecho')">
      <source src="assets/videos/video-derecho.mp4" type="video/mp4" />
      <source src="assets/videos/video-derecho.webm" type="video/webm" />
      Tu navegador no soporta videos.
    </video>

    <!-- Overlay central -->
    <div class="overlay">
      <h1>CEØS BRAND</h1>
      <p>Gestiona los productos</p>
      <a routerLink="/productos" class="boton">Ir al catálogo</a>
    </div>
  </div>
</section>

<!-- Overlay de interacción invisible para móviles -->
<div class="interaction-overlay" (click)="reproducirVideos()" (touchstart)="reproducirVideos()"></div>
